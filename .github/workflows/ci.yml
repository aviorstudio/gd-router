name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate addon package
        run: |
          set -euo pipefail
          test -f addon/plugin.cfg
          test -f addon/autoload.gd
          test -f addon/plugin.gd
          test -f addon/src/core/router.gd
          test -f addon/src/nodes/route_host.gd
          test -f addon/src/nodes/route_link.gd
          test -f addon/src/resources/route_map.gd
          test -f addon/src/resources/route_definition.gd
          test -f addon/src/resources/route_transition.gd
          test -f addon/src/discovery/route_discovery.gd

      - name: Install Godot
        if: ${{ hashFiles('tests/test.sh') != '' }}
        run: |
          set -euo pipefail
          curl -fsSL -o /tmp/godot.zip https://github.com/godotengine/godot/releases/download/4.4.1-stable/Godot_v4.4.1-stable_linux.x86_64.zip
          unzip -q /tmp/godot.zip -d /tmp/godot
          sudo install -m 0755 /tmp/godot/Godot_v4.4.1-stable_linux.x86_64 /usr/local/bin/godot

      - name: Run Godot tests
        if: ${{ hashFiles('tests/test.sh') != '' }}
        run: ./tests/test.sh

      - uses: actions/setup-go@v5
        if: ${{ hashFiles('cli/go.mod') != '' }}
        with:
          go-version-file: cli/go.mod

      - name: Run Go tests
        if: ${{ hashFiles('cli/go.mod') != '' }}
        working-directory: cli
        run: go test ./...
